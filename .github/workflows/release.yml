name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag and release (e.g., 1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.repository.default_branch || github.ref }}
          fetch-depth: 0

      - name: Configure git identity (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Create and push tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $ver = "${{ github.event.inputs.version }}"
          git tag -a "v$ver" -m "release: v$ver"
          git push origin "refs/tags/v$ver"

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $ver = "${{ github.event.inputs.version }}"
          } else {
            $tag = "${{ github.ref_name }}"
            $ver = $tag -replace '^v', ''
          }
          Write-Host "Version: $ver"
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Verify release metadata and build archive
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          ./scripts/release.ps1 verify -Version $ver -Build

      - name: Verify zip assets
        shell: pwsh
        run: |
          $assets = @(
            'dist/cowork-context-framework-kr.zip',
            'dist/cowork-context-framework-en.zip'
          )

          foreach ($asset in $assets) {
            if (-not (Test-Path $asset)) { Write-Error "Missing: $asset"; exit 1 }
            Write-Host "$asset: $((Get-Item $asset).Length) bytes"
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            dist/cowork-context-framework-kr.zip
            dist/cowork-context-framework-en.zip
          generate_release_notes: true
