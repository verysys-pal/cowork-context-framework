<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>client</title>
  </head>
  <body>
    <script>
      // Clear out old Service Workers and caches before the app boots.
      (async () => {
        if (!('serviceWorker' in navigator)) return;

        try {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));

          if ('caches' in window) {
            const cacheKeys = await caches.keys();
            await Promise.all(cacheKeys.map((key) => caches.delete(key)));
          }

          // If this page is currently controlled, reload once so fetches come from the network.
          if (navigator.serviceWorker.controller && !sessionStorage.getItem('sw-kill-switch')) {
            sessionStorage.setItem('sw-kill-switch', '1');
            window.location.reload();
          }
        } catch (error) {
          console.warn('Service worker cleanup failed:', error);
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
